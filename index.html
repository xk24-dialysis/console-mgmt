<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>透析コンソール管理システム</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --blue: #2f81f7;
  --blue-dim: #1f4e9a;
  --green: #3fb950;
  --green-dim: #1a4a24;
  --yellow: #d29922;
  --yellow-dim: #4a3800;
  --red: #f85149;
  --red-dim: #4a0f0d;
  --purple: #a371f7;
  --orange: #f0883e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 8px; }
.nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; cursor: pointer; flex-shrink: 0; }
.nav-brand .logo { width: 28px; height: 28px; background: var(--blue); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.nav-links { display: flex; gap: 4px; }
.nav-link { background: none; border: 1px solid var(--border); color: var(--text2); padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: inherit; white-space: nowrap; }
.nav-link:hover { color: var(--text); border-color: var(--text2); }
.nav-back { background: none; border: 1px solid var(--border); color: var(--text2); padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; display: none; white-space: nowrap; }
.nav-back:hover { color: var(--text); border-color: var(--text2); }

.screen { display: none; }
.screen.active { display: block; }

.config-bar { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; margin: 16px 16px 0; padding: 12px 14px; }
.config-bar-title { font-size: 11px; color: var(--text2); font-weight: 700; margin-bottom: 8px; }
.config-row { display: flex; gap: 8px; align-items: center; }
.config-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 11px; padding: 6px 8px; font-family: inherit; }
.config-input:focus { outline: none; border-color: var(--blue); }
.btn-config-save { background: var(--blue); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
.config-status { font-size: 11px; margin-top: 6px; }
.config-status.ok { color: var(--green); }
.config-status.ng { color: var(--red); }
.config-status.demo { color: var(--yellow); }

/* 今月の予定 */
.schedule-section { margin: 16px 16px 0; }
.schedule-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.schedule-title { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.schedule-badge { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); border-radius: 10px; font-size: 10px; font-weight: 700; padding: 1px 7px; }
.schedule-list { display: flex; flex-direction: column; gap: 6px; }
.schedule-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
.schedule-item:hover { border-color: var(--blue); }
.schedule-item-date { font-size: 13px; font-weight: 700; color: var(--blue); min-width: 52px; }
.schedule-item-date.overdue { color: var(--red); }
.schedule-item-body { flex: 1; }
.schedule-item-device { font-size: 13px; font-weight: 700; }
.schedule-item-type { font-size: 11px; color: var(--text2); margin-top: 2px; }
.schedule-empty { text-align: center; padding: 14px; color: var(--text2); font-size: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }

/* 一覧 */
.list-header { padding: 16px 16px 10px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.list-title { font-size: 18px; font-weight: 700; }
.list-stats { display: flex; gap: 8px; }
.stat-chip { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid; }
.stat-chip.ok { color: var(--green); border-color: var(--green); background: var(--green-dim); }
.stat-chip.warn { color: var(--yellow); border-color: var(--yellow); background: var(--yellow-dim); }
.stat-chip.alert { color: var(--red); border-color: var(--red); background: var(--red-dim); }

.filter-bar { padding: 0 16px 12px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--text2); font-size: 12px; cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.15s; }
.filter-btn.active, .filter-btn:hover { background: var(--blue); border-color: var(--blue); color: #fff; }

.console-grid { padding: 0 16px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.console-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 12px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; }
.console-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.console-card.status-ok::before { background: var(--green); }
.console-card.status-warn::before { background: var(--yellow); }
.console-card.status-alert::before { background: var(--red); }
.console-card:hover { border-color: var(--blue); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(47,129,247,0.15); }
.card-id { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 1px; }
.card-sub { font-size: 10px; color: var(--text2); margin-bottom: 6px; font-family: monospace; }
.card-model { font-size: 10px; color: var(--text2); margin-bottom: 8px; }
.card-status { font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
.card-status.ok { color: var(--green); }
.card-status.warn { color: var(--yellow); }
.card-status.alert { color: var(--red); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.ok .status-dot { background: var(--green); }
.warn .status-dot { background: var(--yellow); }
.alert .status-dot { background: var(--red); }

.loading { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 詳細 */
.detail-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px; }
.detail-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.detail-id { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
.detail-subid { font-size: 11px; color: var(--text2); margin-top: 1px; font-family: monospace; }
.detail-model { font-size: 13px; color: var(--text2); margin-top: 2px; }
.status-badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; border: 1px solid; }
.status-badge.ok { color: var(--green); border-color: var(--green); background: var(--green-dim); }
.status-badge.warn { color: var(--yellow); border-color: var(--yellow); background: var(--yellow-dim); }
.status-badge.alert { color: var(--red); border-color: var(--red); background: var(--red-dim); }

/* 稼働状況切り替えボタン */
.status-toggle { display: flex; gap: 6px; margin-bottom: 12px; }
.status-toggle-btn { flex: 1; padding: 8px 4px; border-radius: 8px; border: 1px solid var(--border); background: none; color: var(--text2); font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.status-toggle-btn.active-ok   { background: var(--green-dim);  border-color: var(--green);  color: var(--green); }
.status-toggle-btn.active-warn { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }
.status-toggle-btn.active-alert{ background: var(--red-dim);    border-color: var(--red);    color: var(--red); }
.status-toggle-btn:hover:not([class*="active"]) { border-color: var(--text2); color: var(--text); }
.status-update-msg { font-size: 11px; text-align: center; margin-bottom: 8px; min-height: 16px; }
.status-update-msg.ok { color: var(--green); }
.status-update-msg.ng { color: var(--red); }

.detail-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.meta-label { font-size: 10px; color: var(--text2); margin-bottom: 2px; }
.meta-value { font-size: 13px; font-weight: 600; }

.tab-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); overflow-x: auto; scrollbar-width: none; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn { padding: 12px 14px; border: none; background: none; color: var(--text2); font-size: 12px; cursor: pointer; white-space: nowrap; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
.tab-btn:hover:not(.active) { color: var(--text); }

.tab-content { display: none; padding: 16px; }
.tab-content.active { display: block; }

.section-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
.btn-add { background: var(--blue); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-add:hover { opacity: 0.85; }

.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.history-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.history-type { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
.type-inspect    { background: rgba(47,129,247,0.15); color: var(--blue); }
.type-trouble    { background: rgba(248,81,73,0.15);  color: var(--red); }
.type-consumable { background: rgba(240,136,62,0.15); color: var(--orange); }
.type-repair     { background: rgba(163,113,247,0.15);color: var(--purple); }
.history-date    { font-size: 11px; color: var(--text2); }
.history-content { font-size: 13px; line-height: 1.5; }
.history-staff   { font-size: 11px; color: var(--text2); margin-top: 4px; }
.history-next    { font-size: 11px; color: var(--blue); margin-top: 4px; }

.empty-state { text-align: center; padding: 32px 16px; color: var(--text2); font-size: 13px; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 20px 16px 32px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; animation: slideup 0.25s ease; }
@keyframes slideup { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.modal-close { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; font-weight: 600; }
.form-input, .form-select, .form-textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; padding: 10px 12px; font-family: inherit; outline: none; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--blue); }
.form-textarea { min-height: 80px; resize: vertical; }
.form-select option { background: var(--surface2); }
.btn-submit { width: 100%; background: var(--blue); color: #fff; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 6px; }
.btn-submit:hover { opacity: 0.9; }
.btn-submit:disabled { opacity: 0.5; cursor: default; }

.qr-demo-bar { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin: 16px 16px 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.qr-demo-label { font-size: 11px; color: var(--text2); flex: 1; min-width: 120px; }
.qr-demo-select { background: var(--blue-dim); border: 1px solid var(--blue); border-radius: 6px; color: var(--blue); font-size: 12px; padding: 5px 8px; font-family: inherit; cursor: pointer; font-weight: 600; }
.btn-scan { background: var(--blue); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }

.save-result { text-align: center; padding: 8px; font-size: 13px; border-radius: 8px; margin-top: 8px; }
.save-result.ok { background: var(--green-dim); color: var(--green); }
.save-result.ng { background: var(--red-dim); color: var(--red); }

/* 履歴一覧・買替推奨年ページ共通 */
.page-header { padding: 16px; border-bottom: 1px solid var(--border); }
.page-title { font-size: 18px; font-weight: 700; }
.page-subtitle { font-size: 12px; color: var(--text2); margin-top: 4px; }
.sort-bar { padding: 10px 16px; display: flex; gap: 8px; border-bottom: 1px solid var(--border); background: var(--surface); }
.sort-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--text2); font-size: 12px; cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.15s; }
.sort-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

/* 全履歴 */
.all-history-list { padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.history-item-device { font-size: 11px; font-weight: 700; color: var(--blue); margin-bottom: 4px; }
.history-group-label { font-size: 13px; font-weight: 700; color: var(--blue); padding: 6px 0; border-bottom: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; }
.history-group-label:hover { color: var(--text); }
.history-group { margin-bottom: 20px; }

/* 買替推奨年 */
.replace-list { padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.replace-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.15s; }
.replace-item:hover { border-color: var(--blue); }
.replace-year-badge { font-size: 22px; font-weight: 700; min-width: 56px; text-align: center; }
.replace-year-badge.past  { color: var(--red); }
.replace-year-badge.soon  { color: var(--yellow); }
.replace-year-badge.future{ color: var(--green); }
.replace-item-info { flex: 1; }
.replace-item-machine { font-size: 15px; font-weight: 700; }
.replace-item-id    { font-size: 11px; color: var(--text2); margin-top: 2px; font-family: monospace; }
.replace-item-model { font-size: 12px; color: var(--text2); }
.replace-item-lease { font-size: 11px; color: var(--text2); margin-top: 4px; }
.replace-year-label { font-size: 10px; color: var(--text2); margin-bottom: 2px; }
</style>

<script>
// ── 状態管理 ──
let allDevices = [];
let currentFilter = 'all';
let currentDevice = null;
let gasUrl = GAS_URL;
let allHistoryData = [];
let allHistorySort = 'timeline';
let allHistoryLoaded = false;

// ── 初期化 ──
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('gasUrl');
  if (saved && saved.trim() !== '') gasUrl = saved.trim();

  const input = document.getElementById('gas-url-input');
  if (input) input.value = gasUrl || '';

  updateConfigStatus();
  loadDeviceList();
  loadSchedule();

  const today = new Date().toISOString().split('T')[0];
  ['i-date','r-date'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = today;
  });
});

// ── 画面切り替え ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  const isDetail = id === 'screen-detail';
  document.getElementById('nav-back').style.display  = isDetail ? 'block' : 'none';
  document.getElementById('nav-links').style.display = isDetail ? 'none'  : 'flex';

  window.scrollTo(0, 0);

  if (id === 'screen-all-history')  loadAllHistory();
  if (id === 'screen-replace-years') loadReplaceYears();
}

// ── GAS URL設定 ──
function saveGasUrl() {
  const val = document.getElementById('gas-url-input').value.trim();
  gasUrl = val;
  localStorage.setItem('gasUrl', val);
  updateConfigStatus();
  loadDeviceList();
}

function updateConfigStatus() {
  const el = document.getElementById('config-status');
  if (!gasUrl) {
    el.className = 'config-status demo';
    el.textContent = '⚠ GAS URLが未設定です。デモデータで動作しています。';
  } else {
    el.className = 'config-status ok';
    el.textContent = '✅ GAS URL設定済み（実データで動作）';
  }
}

// ── API呼び出し ──
async function apiGet(params) {
  if (!gasUrl) return null;
  const url = gasUrl + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return await res.json();
}

async function apiPost(body) {
  if (!gasUrl) return { error: 'GAS URLが未設定です' };
  const res = await fetch(gasUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return await res.json();
}

// ── 機器一覧読み込み ──
async function loadDeviceList() {
  const grid = document.getElementById('console-grid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';

  let devices = DEMO_DEVICES;
  if (gasUrl && gasUrl.trim() !== '') {
    try {
      const data = await apiGet({ action: 'getList' });
      if (data && data.devices && data.devices.length > 0) devices = data.devices;
    } catch(e) {
      console.warn('GAS接続失敗、デモデータを使用:', e);
    }
  }

  allDevices = devices;
  renderList('all');
}

function renderList(filter) {
  currentFilter = filter;
  const grid = document.getElementById('console-grid');
  const filtered = allDevices.filter(d => {
    if (filter === 'all') return true;
    if (['ok','warn','alert'].includes(filter)) return d.status === filter;
    return d.site === filter;
  });

  const okCount    = allDevices.filter(d => d.status === 'ok').length;
  const warnCount  = allDevices.filter(d => d.status === 'warn').length;
  const alertCount = allDevices.filter(d => d.status === 'alert').length;
  document.getElementById('list-stats').innerHTML = `
    <div class="stat-chip ok">正常 ${okCount}</div>
    <div class="stat-chip warn">要注意 ${warnCount}</div>
    <div class="stat-chip alert">要対応 ${alertCount}</div>
  `;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">該当する機器がありません</div>';
    return;
  }

  const statusLabel = { ok:'正常稼働', warn:'要注意', alert:'要対応' };
  grid.innerHTML = filtered.map(d => {
    const hasMachineNo = d.machineNo !== undefined && d.machineNo !== null && d.machineNo !== '-';
    const bigText = hasMachineNo ? 'No.' + d.machineNo : d.id;
    const subText = hasMachineNo ? d.id : '';
    return `
      <div class="console-card status-${d.status || 'ok'}" onclick="showDetail('${d.id}')">
        <div class="card-id">${bigText}</div>
        ${subText ? `<div class="card-sub">${subText}</div>` : ''}
        <div class="card-model">${d.model || ''}</div>
        <div class="card-status ${d.status || 'ok'}">
          <span class="status-dot"></span>${statusLabel[d.status] || '正常'}
        </div>
        <div class="card-model" style="margin-top:4px">${d.site || ''}</div>
      </div>
    `;
  }).join('');
}

function filterConsoles(btn, filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList(filter);
}

// ── 今月の予定 ──
async function loadSchedule() {
  const list = document.getElementById('schedule-list');
  const countBadge = document.getElementById('schedule-count');

  let schedules = DEMO_SCHEDULE;
  if (gasUrl) {
    try {
      const data = await apiGet({ action: 'getSchedule' });
      if (data && data.schedules) schedules = data.schedules;
    } catch(e) {
      schedules = DEMO_SCHEDULE;
    }
  }

  countBadge.textContent = schedules.length;

  if (schedules.length === 0) {
    list.innerHTML = '<div class="schedule-empty">今月の予定はありません</div>';
    return;
  }

  const today = new Date();
  list.innerHTML = schedules.map(s => {
    const d = new Date(s.nextDate.replace(/\//g, '-'));
    const isOverdue = d < today;
    const mmdd = s.nextDate.slice(5).replace('/', '/');
    const hasMachineNo = s.machineNo !== undefined && s.machineNo !== null && s.machineNo !== '-';
    const deviceLabel = hasMachineNo ? `No.${s.machineNo}` : s.deviceId;
    return `
      <div class="schedule-item" onclick="showDetail('${s.deviceId}')">
        <div class="schedule-item-date ${isOverdue ? 'overdue' : ''}">${mmdd}</div>
        <div class="schedule-item-body">
          <div class="schedule-item-device">${deviceLabel}　${s.model || ''}</div>
          <div class="schedule-item-type">${s.type}${s.parts ? '：' + s.parts : ''}　${s.site || ''}</div>
        </div>
      </div>
    `;
  }).join('');
}

// ── 機器詳細表示 ──
async function showDetail(id) {
  // 画面切り替え
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-detail').classList.add('active');
  document.getElementById('nav-back').style.display  = 'block';
  document.getElementById('nav-links').style.display = 'none';
  window.scrollTo(0, 0);

  // タブ初期化
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab-btn').classList.add('active');
  document.getElementById('tab-history').classList.add('active');
  document.getElementById('status-update-msg').textContent = '';

  // 機器情報取得
  let device;
  if (gasUrl) {
    try {
      device = await apiGet({ action: 'getDevice', id });
    } catch(e) {
      device = allDevices.find(d => d.id === id) || {};
    }
  } else {
    device = allDevices.find(d => d.id === id) || {};
  }
  currentDevice = device;

  const statusMap = { ok:['ok','✅ 正常'], warn:['warn','⚠️ 要注意'], alert:['alert','🚨 要対応'] };
  const [cls] = statusMap[device.status] || ['ok'];

  const hasMachineNo = device.machineNo !== undefined && device.machineNo !== null && device.machineNo !== '-';
  document.getElementById('d-id').textContent      = hasMachineNo ? 'No.' + device.machineNo : (device.id || id);
  document.getElementById('d-subid').textContent   = hasMachineNo ? 'ID: ' + (device.id || id) : '';
  document.getElementById('d-model').textContent   = device.model || '';
  document.getElementById('d-site').textContent    = device.site || '';
  document.getElementById('d-deviceid').textContent= device.id || id;
  document.getElementById('d-lease').textContent   = device.leaseCompany || '-';
  document.getElementById('d-leasestart').textContent = device.startDate || '-';
  document.getElementById('d-replace').textContent = device.replaceYear || '-';

  updateStatusUI(device.status || 'ok');

  loadHistory(id);
}

// ── 稼働状況UI更新 ──
function updateStatusUI(status) {
  const statusMap = { ok:['ok','✅ 正常'], warn:['warn','⚠️ 要注意'], alert:['alert','🚨 要対応'] };
  const [cls, lbl] = statusMap[status] || ['ok','✅ 正常'];
  const status2Map = { ok:'稼働中', warn:'要注意', alert:'要対応' };

  const badge = document.getElementById('d-status');
  badge.className = 'status-badge ' + cls;
  badge.textContent = lbl;
  document.getElementById('d-status2').textContent = status2Map[status] || '稼働中';

  ['ok','warn','alert'].forEach(s => {
    const btn = document.getElementById('btn-status-' + s);
    btn.className = 'status-toggle-btn' + (s === status ? ' active-' + s : '');
  });
}

// ── 稼働状況変更 ──
async function updateStatus(newStatus) {
  const id = currentDevice?.id;
  if (!id) return;

  currentDevice.status = newStatus;
  updateStatusUI(newStatus);

  // allDevicesも更新
  const d = allDevices.find(d => d.id === id);
  if (d) d.status = newStatus;

  const msgEl = document.getElementById('status-update-msg');

  if (!gasUrl) {
    msgEl.className = 'status-update-msg ok';
    msgEl.textContent = '（デモ）ステータスを変更しました';
    return;
  }

  try {
    const result = await apiPost({ action: 'updateStatus', deviceId: id, status: newStatus });
    if (result.success) {
      msgEl.className = 'status-update-msg ok';
      msgEl.textContent = '✅ スプレッドシートを更新しました';
    } else {
      throw new Error(result.error || '更新失敗');
    }
  } catch(e) {
    msgEl.className = 'status-update-msg ng';
    msgEl.textContent = '❌ 更新エラー: ' + e.message;
  }
  setTimeout(() => { msgEl.textContent = ''; }, 3000);
}

// ── 機器履歴読み込み ──
async function loadHistory(id) {
  const list = document.getElementById('history-list');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';

  let records;
  if (gasUrl) {
    try {
      const data = await apiGet({ action: 'getHistory', id });
      records = data.records || [];
    } catch(e) {
      records = DEMO_HISTORY[id] || [];
    }
  } else {
    records = DEMO_HISTORY[id] || [];
  }

  if (records.length === 0) {
    list.innerHTML = '<div class="empty-state">記録がありません</div>';
    return;
  }

  const typeClass = { '定期点検':'type-inspect', '部品交換':'type-consumable', 'アラーム対応':'type-trouble', '業者対応':'type-repair' };
  list.innerHTML = records.map(r => `
    <div class="history-item">
      <div class="history-top">
        <span class="history-type ${typeClass[r.type] || 'type-consumable'}">${r.type || ''}</span>
        <span class="history-date">${r.date || ''}</span>
      </div>
      <div class="history-content">${r.parts ? r.parts + '　' : ''}${r.content || ''}</div>
      <div class="history-staff">${r.vendor ? '業者: ' + r.vendor + '　' : ''}${r.staff ? '担当: ' + r.staff : ''}</div>
      ${r.nextDate ? `<div class="history-next">📅 次回予定: ${r.nextDate}</div>` : ''}
    </div>
  `).join('');
}

// ── 記録保存 ──
async function submitRecord(type) {
  const isInspect = type === 'inspect';
  const btnId    = isInspect ? 'btn-inspect-submit' : 'btn-repair-submit';
  const resultId = isInspect ? 'inspect-result'     : 'repair-result';
  const btn      = document.getElementById(btnId);
  const resultEl = document.getElementById(resultId);

  const date    = document.getElementById(isInspect ? 'i-date'    : 'r-date').value;
  const content = document.getElementById(isInspect ? 'i-content' : 'r-content').value;
  const staff   = document.getElementById(isInspect ? 'i-staff'   : 'r-staff').value;

  if (!date || !content) {
    resultEl.className = 'save-result ng';
    resultEl.textContent = '日付と内容は必須です';
    return;
  }

  btn.disabled = true;
  btn.textContent = '保存中...';

  const payload = isInspect ? {
    action: 'addRecord',
    recordType:  '点検',
    deviceId:    currentDevice?.id || '',
    site:        currentDevice?.site || '',
    model:       currentDevice?.model || '',
    date,
    inspectType: document.getElementById('i-type').value,
    content,
    staff,
    nextDate:    document.getElementById('i-next').value,
  } : {
    action: 'addRecord',
    recordType:  document.getElementById('r-type').value,
    deviceId:    currentDevice?.id || '',
    site:        currentDevice?.site || '',
    machineNo:   currentDevice?.machineNo || '',
    model:       currentDevice?.model || '',
    date,
    parts:   document.getElementById('r-parts').value,
    content,
    vendor:  document.getElementById('r-vendor').value,
    staff,
    nextDate: document.getElementById('r-next').value,
  };

  try {
    const result = await apiPost(payload);
    if (result.success) {
      resultEl.className = 'save-result ok';
      resultEl.textContent = '✅ 保存しました！スプレッドシートに反映されています。';
      loadHistory(currentDevice?.id);
    } else {
      throw new Error(result.error || '保存に失敗しました');
    }
  } catch(e) {
    if (!gasUrl) {
      resultEl.className = 'save-result ok';
      resultEl.textContent = '✅ （デモ）保存しました。GAS URL設定後は実際のスプレッドシートに保存されます。';
    } else {
      resultEl.className = 'save-result ng';
      resultEl.textContent = '❌ エラー: ' + e.message;
    }
  }

  btn.disabled = false;
  btn.textContent = isInspect ? '📋 点検記録を保存' : '🔧 修理・部品記録を保存';
}

// ── 全履歴一覧 ──
async function loadAllHistory() {
  if (allHistoryLoaded) { renderAllHistory(); return; }
  const container = document.getElementById('all-history-list');
  container.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';

  let records = DEMO_ALL_HISTORY;
  if (gasUrl) {
    try {
      const data = await apiGet({ action: 'getAllHistory' });
      if (data && data.records) records = data.records;
    } catch(e) {
      records = DEMO_ALL_HISTORY;
    }
  }

  allHistoryData = records;
  allHistoryLoaded = true;
  renderAllHistory();
}

function sortAllHistory(mode) {
  allHistorySort = mode;
  document.getElementById('sort-btn-timeline').classList.toggle('active', mode === 'timeline');
  document.getElementById('sort-btn-device').classList.toggle('active', mode === 'device');
  renderAllHistory();
}

function renderAllHistory() {
  const container = document.getElementById('all-history-list');
  const typeClass = { '定期点検':'type-inspect', '部品交換':'type-consumable', 'アラーム対応':'type-trouble', '業者対応':'type-repair' };

  function historyItemHtml(r, showDevice) {
    const deviceLabel = (r.machineNo !== undefined && r.machineNo !== null && r.machineNo !== '-')
      ? `No.${r.machineNo}　${r.deviceId}`
      : r.deviceId;
    return `
      <div class="history-item" onclick="showDetail('${r.deviceId}')" style="cursor:pointer">
        ${showDevice ? `<div class="history-item-device">${deviceLabel}</div>` : ''}
        <div class="history-top">
          <span class="history-type ${typeClass[r.type] || 'type-consumable'}">${r.type || ''}</span>
          <span class="history-date">${r.date || ''}</span>
        </div>
        <div class="history-content">${r.parts ? r.parts + '　' : ''}${r.content || ''}</div>
        <div class="history-staff">${r.vendor ? '業者: ' + r.vendor + '　' : ''}${r.staff ? '担当: ' + r.staff : ''}</div>
        ${r.nextDate ? `<div class="history-next">📅 次回予定: ${r.nextDate}</div>` : ''}
      </div>
    `;
  }

  if (allHistoryData.length === 0) {
    container.innerHTML = '<div class="empty-state">記録がありません</div>';
    return;
  }

  if (allHistorySort === 'timeline') {
    const sorted = [...allHistoryData].sort((a, b) => new Date(b.date) - new Date(a.date));
    container.innerHTML = sorted.map(r => historyItemHtml(r, true)).join('');
  } else {
    // 機器別グループ
    const groups = {};
    allHistoryData.forEach(r => {
      if (!groups[r.deviceId]) groups[r.deviceId] = { deviceId: r.deviceId, machineNo: r.machineNo, records: [] };
      groups[r.deviceId].records.push(r);
    });
    const sortedGroups = Object.values(groups).sort((a, b) => {
      const an = (a.machineNo === '-' || a.machineNo === undefined) ? 9999 : Number(a.machineNo);
      const bn = (b.machineNo === '-' || b.machineNo === undefined) ? 9999 : Number(b.machineNo);
      return an - bn;
    });
    sortedGroups.forEach(g => g.records.sort((a, b) => new Date(b.date) - new Date(a.date)));

    container.innerHTML = sortedGroups.map(g => {
      const hasMachineNo = g.machineNo !== undefined && g.machineNo !== null && g.machineNo !== '-';
      const label = hasMachineNo ? `No.${g.machineNo}　${g.deviceId}` : g.deviceId;
      return `
        <div class="history-group">
          <div class="history-group-label" onclick="showDetail('${g.deviceId}')">🔧 ${label}</div>
          ${g.records.map(r => historyItemHtml(r, false)).join('')}
        </div>
      `;
    }).join('');
  }
}

// ── 買替推奨年一覧 ──
async function loadReplaceYears() {
  const container = document.getElementById('replace-years-list');
  if (container.dataset.loaded) return;

  let devices = DEMO_DEVICES.filter(d => d.replaceYear);
  if (gasUrl) {
    try {
      const data = await apiGet({ action: 'getReplaceYears' });
      if (data && data.devices) devices = data.devices;
    } catch(e) { /* demo fallback */ }
  }

  devices = [...devices].sort((a, b) => (a.replaceYear || 9999) - (b.replaceYear || 9999));

  const currentYear = new Date().getFullYear();
  if (devices.length === 0) {
    container.innerHTML = '<div class="empty-state">データがありません</div>';
    return;
  }

  container.innerHTML = devices.map(d => {
    const year = Number(d.replaceYear);
    let yearClass = year < currentYear ? 'past' : year <= currentYear + 1 ? 'soon' : 'future';
    const hasMachineNo = d.machineNo !== undefined && d.machineNo !== null && d.machineNo !== '-';
    const machineLabel = hasMachineNo ? 'No.' + d.machineNo : d.id;
    return `
      <div class="replace-item" onclick="showDetail('${d.id}')">
        <div>
          <div class="replace-year-label">買替推奨年</div>
          <div class="replace-year-badge ${yearClass}">${year || '-'}</div>
        </div>
        <div class="replace-item-info">
          <div class="replace-item-machine">${machineLabel}</div>
          <div class="replace-item-id">${d.id}　${d.site || ''}</div>
          <div class="replace-item-model">${d.model || ''}</div>
          <div class="replace-item-lease">${d.leaseCompany || ''}　導入：${d.startDate || '-'}</div>
        </div>
      </div>
    `;
  }).join('');

  container.dataset.loaded = '1';
}

// ── その他 ──
function switchTab(btn, tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

function scanQR() {
  const id = document.getElementById('qr-select').value;
  showDetail(id);
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
